exclude = [ ".git/**", "target/**" ]
include = [ "**/*.toml", "*.toml" ]

[formatting]
align_entries         = true
array_auto_collapse   = false
array_auto_expand     = true
column_width          = 100
compact_arrays        = false
compact_inline_tables = false
indent_string         = "  "
reorder_arrays        = false
reorder_keys          = false
trailing_newline      = true
